{
    "openapi": "3.0.3",
    "info": {
        "title": "Payments API",
        "version": "1.0.0",
        "description": "Demo payments service for the Postman API Catalog walkthrough.\n\nOptional query parameters on all endpoints except /openapi.json:\n- delay or wait: milliseconds to wait before responding (max 30000)\n- status or error: HTTP status code to return (e.g. 500); error=true also returns 500"
    },
    "servers": [
        {
            "url": "https://postman-api-catalog-demo-payments.davidespi.workers.dev",
            "description": "Deployed worker"
        }
    ],
    "tags": [
        {
            "name": "Payments",
            "description": "Payment processing changed"
        },
        {
            "name": "Refunds",
            "description": "Refund operations on the Payments backend (outbound webhook notifications are specified separately)"
        },
        {
            "name": "System",
            "description": "Health and metadata"
        }
    ],
    "paths": {
        "/health": {
            "get": {
                "tags": [
                    "System"
                ],
                "operationId": "getHealth",
                "summary": "Health check",
                "responses": {
                    "200": {
                        "description": "Service is healthy",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HealthResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/openapi.json": {
            "get": {
                "tags": [
                    "System"
                ],
                "operationId": "getOpenApi",
                "summary": "OpenAPI specification",
                "responses": {
                    "200": {
                        "description": "OpenAPI document",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "type": "object"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/payments": {
            "get": {
                "tags": [
                    "Payments"
                ],
                "operationId": "listPayments",
                "summary": "List payments",
                "responses": {
                    "200": {
                        "description": "Payment list",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/PaymentListResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "post": {
                "tags": [
                    "Payments"
                ],
                "operationId": "createPayment",
                "summary": "Create payment",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/CreatePaymentRequest"
                            },
                            "example": {
                                "orderId": "ord-001",
                                "amount": 49.99,
                                "status": "completed",
                                "currency": "USD"
                            }
                        }
                    }
                },
                "responses": {
                    "201": {
                        "description": "Payment created",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Payment"
                                }
                            }
                        }
                    },
                    "400": {
                        "description": "Invalid request",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/payments/{id}": {
            "parameters": [
                {
                    "name": "id",
                    "in": "path",
                    "required": true,
                    "description": "Payment identifier",
                    "schema": {
                        "type": "string",
                        "example": "pay-001"
                    }
                }
            ],
            "get": {
                "tags": [
                    "Payments"
                ],
                "operationId": "getPayment",
                "summary": "Get payment by ID",
                "responses": {
                    "200": {
                        "description": "Payment found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Payment"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Payment not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "put": {
                "tags": [
                    "Payments"
                ],
                "operationId": "updatePayment",
                "summary": "Replace payment",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/UpdatePaymentRequest"
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Payment updated",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Payment"
                                }
                            }
                        }
                    },
                    "400": {
                        "description": "Invalid request",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Payment not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "patch": {
                "tags": [
                    "Payments"
                ],
                "operationId": "patchPayment",
                "summary": "Partially update payment",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/PatchPaymentRequest"
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Payment patched",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Payment"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Payment not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "delete": {
                "tags": [
                    "Payments"
                ],
                "operationId": "deletePayment",
                "summary": "Delete payment",
                "responses": {
                    "204": {
                        "description": "Payment deleted"
                    },
                    "404": {
                        "description": "Payment not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/payments/refund": {
            "post": {
                "tags": [
                    "Refunds"
                ],
                "operationId": "refundPayment",
                "summary": "Refund a payment",
                "description": "Refunds a payment by ID. On success, the Payments service asynchronously publishes a `payment.refunded` event to the external **Payment Refund Webhook API** (not part of this backend).",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/RefundPaymentRequest"
                            },
                            "example": {
                                "paymentId": "pay-001",
                                "reason": "customer_request"
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Refund processed",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Payment"
                                }
                            }
                        }
                    },
                    "400": {
                        "description": "Invalid request",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Payment not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        }
    },
    "components": {
        "schemas": {
            "HealthResponse": {
                "type": "object",
                "required": [
                    "status",
                    "service",
                    "version"
                ],
                "properties": {
                    "status": {
                        "type": "string",
                        "enum": [
                            "ok"
                        ],
                        "example": "ok"
                    },
                    "service": {
                        "type": "string",
                        "example": "payments-api"
                    },
                    "version": {
                        "type": "string",
                        "example": "1.0.0"
                    }
                }
            },
            "PaymentStatus": {
                "type": "string",
                "enum": [
                    "pending",
                    "completed",
                    "refunded"
                ],
                "example": "completed"
            },
            "CurrencyCode": {
                "type": "string",
                "minLength": 3,
                "maxLength": 3,
                "example": "USD"
            },
            "Payment": {
                "type": "object",
                "required": [
                    "id",
                    "orderId",
                    "amount",
                    "status",
                    "currency"
                ],
                "properties": {
                    "id": {
                        "type": "string",
                        "description": "Unique payment identifier",
                        "example": "pay-001"
                    },
                    "orderId": {
                        "type": "string",
                        "description": "Associated order ID",
                        "example": "ord-001"
                    },
                    "amount": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 49.99
                    },
                    "status": {
                        "$ref": "#/components/schemas/PaymentStatus"
                    },
                    "currency": {
                        "$ref": "#/components/schemas/CurrencyCode"
                    },
                    "refundReason": {
                        "type": "string",
                        "description": "Present when status is refunded",
                        "example": "customer_request"
                    },
                    "refundedAt": {
                        "type": "string",
                        "format": "date-time",
                        "description": "ISO timestamp when refund was processed"
                    }
                }
            },
            "PaymentListResponse": {
                "type": "object",
                "required": [
                    "data",
                    "count"
                ],
                "properties": {
                    "data": {
                        "type": "array",
                        "items": {
                            "$ref": "#/components/schemas/Payment"
                        }
                    },
                    "count": {
                        "type": "integer",
                        "minimum": 0,
                        "example": 1
                    }
                }
            },
            "CreatePaymentRequest": {
                "type": "object",
                "required": [
                    "orderId",
                    "amount"
                ],
                "properties": {
                    "orderId": {
                        "type": "string",
                        "example": "ord-001"
                    },
                    "amount": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 49.99
                    },
                    "status": {
                        "allOf": [
                            {
                                "$ref": "#/components/schemas/PaymentStatus"
                            }
                        ],
                        "default": "completed"
                    },
                    "currency": {
                        "allOf": [
                            {
                                "$ref": "#/components/schemas/CurrencyCode"
                            }
                        ],
                        "default": "USD"
                    }
                }
            },
            "UpdatePaymentRequest": {
                "type": "object",
                "required": [
                    "orderId",
                    "amount",
                    "status"
                ],
                "properties": {
                    "orderId": {
                        "type": "string",
                        "example": "ord-002"
                    },
                    "amount": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 129.5
                    },
                    "status": {
                        "$ref": "#/components/schemas/PaymentStatus"
                    },
                    "currency": {
                        "$ref": "#/components/schemas/CurrencyCode"
                    }
                }
            },
            "PatchPaymentRequest": {
                "type": "object",
                "minProperties": 1,
                "properties": {
                    "orderId": {
                        "type": "string"
                    },
                    "amount": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0
                    },
                    "status": {
                        "$ref": "#/components/schemas/PaymentStatus"
                    },
                    "currency": {
                        "$ref": "#/components/schemas/CurrencyCode"
                    }
                }
            },
            "RefundPaymentRequest": {
                "type": "object",
                "required": [
                    "paymentId"
                ],
                "properties": {
                    "paymentId": {
                        "type": "string",
                        "example": "pay-001"
                    },
                    "reason": {
                        "type": "string",
                        "example": "customer_request"
                    }
                }
            },
            "ErrorResponse": {
                "type": "object",
                "required": [
                    "error"
                ],
                "properties": {
                    "error": {
                        "type": "string",
                        "example": "Payment not found"
                    },
                    "service": {
                        "type": "string",
                        "example": "payments-api"
                    }
                }
            },
            "ServerErrorResponse": {
                "type": "object",
                "required": [
                    "error"
                ],
                "properties": {
                    "error": {
                        "type": "string",
                        "example": "Simulated response for API Catalog demo"
                    },
                    "status": {
                        "type": "integer",
                        "example": 500
                    },
                    "simulated": {
                        "type": "boolean",
                        "example": true
                    },
                    "service": {
                        "type": "string",
                        "example": "payments-api"
                    },
                    "delayMs": {
                        "type": "integer"
                    }
                }
            }
        },
        "responses": {
            "InternalServerError": {
                "description": "Internal server error. Simulatable with ?status=500 on any endpoint except /openapi.json.",
                "content": {
                    "application/json": {
                        "schema": {
                            "$ref": "#/components/schemas/ServerErrorResponse"
                        }
                    }
                }
            }
        }
    }
}