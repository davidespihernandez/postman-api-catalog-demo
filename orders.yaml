{
    "openapi": "3.0.3",
    "info": {
        "title": "Orders API",
        "version": "1.0.0",
        "description": "Demo orders service for the Postman API Catalog walkthrough.\n\nOptional query parameters on all endpoints except /openapi.json:\n- delay or wait: milliseconds to wait before responding (max 30000)\n- status or error: HTTP status code to return (e.g. 500); error=true also returns 500"
    },
    "servers": [
        {
            "url": "https://postman-api-catalog-demo-orders.davidespi.workers.dev",
            "description": "Deployed worker"
        }
    ],
    "tags": [
        {
            "name": "Orders",
            "description": "Order management"
        },
        {
            "name": "System",
            "description": "Health and metadata"
        }
    ],
    "paths": {
        "/health": {
            "get": {
                "tags": [
                    "System"
                ],
                "operationId": "getHealth",
                "summary": "Health check",
                "responses": {
                    "200": {
                        "description": "Service is healthy",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/HealthResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/openapi.json": {
            "get": {
                "tags": [
                    "System"
                ],
                "operationId": "getOpenApi",
                "summary": "OpenAPI specification",
                "responses": {
                    "200": {
                        "description": "OpenAPI document",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/OpenApiDocument"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/orders": {
            "get": {
                "tags": [
                    "Orders"
                ],
                "operationId": "listOrders",
                "summary": "List orders",
                "responses": {
                    "200": {
                        "description": "Paginated-style order list",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/OrderListResponse"
                                },
                                "example": {
                                    "data": [
                                        {
                                            "id": "ord-001",
                                            "customerId": "usr-001",
                                            "status": "shipped",
                                            "total": 49.99,
                                            "currency": "USD"
                                        }
                                    ],
                                    "count": 1
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "post": {
                "tags": [
                    "Orders"
                ],
                "operationId": "createOrder",
                "summary": "Create order",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/CreateOrderRequest"
                            },
                            "example": {
                                "customerId": "usr-002",
                                "total": 99.5,
                                "status": "pending",
                                "currency": "USD"
                            }
                        }
                    }
                },
                "responses": {
                    "201": {
                        "description": "Order created",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Order"
                                },
                                "example": {
                                    "id": "ord-a1b2c3d4",
                                    "customerId": "usr-002",
                                    "status": "pending",
                                    "total": 99.5,
                                    "currency": "USD"
                                }
                            }
                        }
                    },
                    "400": {
                        "description": "Invalid request",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        },
        "/orders/{id}": {
            "parameters": [
                {
                    "name": "id",
                    "in": "path",
                    "required": true,
                    "description": "Order identifier",
                    "schema": {
                        "type": "string",
                        "example": "ord-001"
                    }
                }
            ],
            "get": {
                "tags": [
                    "Orders"
                ],
                "operationId": "getOrder",
                "summary": "Get order by ID",
                "responses": {
                    "200": {
                        "description": "Order found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Order"
                                },
                                "example": {
                                    "id": "ord-001",
                                    "customerId": "usr-001",
                                    "status": "shipped",
                                    "total": 49.99,
                                    "currency": "USD"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Order not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                },
                                "example": {
                                    "error": "Order not found"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "put": {
                "tags": [
                    "Orders"
                ],
                "operationId": "updateOrder",
                "summary": "Replace order",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/UpdateOrderRequest"
                            },
                            "example": {
                                "customerId": "usr-003",
                                "total": 149.99,
                                "status": "processing",
                                "currency": "EUR"
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Order updated",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Order"
                                },
                                "example": {
                                    "id": "ord-001",
                                    "customerId": "usr-003",
                                    "status": "processing",
                                    "total": 149.99,
                                    "currency": "EUR"
                                }
                            }
                        }
                    },
                    "400": {
                        "description": "Invalid request",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Order not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "patch": {
                "tags": [
                    "Orders"
                ],
                "operationId": "patchOrder",
                "summary": "Partially update order",
                "requestBody": {
                    "required": true,
                    "content": {
                        "application/json": {
                            "schema": {
                                "$ref": "#/components/schemas/PatchOrderRequest"
                            },
                            "example": {
                                "status": "shipped"
                            }
                        }
                    }
                },
                "responses": {
                    "200": {
                        "description": "Order patched",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/Order"
                                },
                                "example": {
                                    "id": "ord-001",
                                    "customerId": "usr-003",
                                    "status": "shipped",
                                    "total": 149.99,
                                    "currency": "EUR"
                                }
                            }
                        }
                    },
                    "404": {
                        "description": "Order not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            },
            "delete": {
                "tags": [
                    "Orders"
                ],
                "operationId": "deleteOrder",
                "summary": "Delete order",
                "responses": {
                    "204": {
                        "description": "Order deleted"
                    },
                    "404": {
                        "description": "Order not found",
                        "content": {
                            "application/json": {
                                "schema": {
                                    "$ref": "#/components/schemas/ErrorResponse"
                                }
                            }
                        }
                    },
                    "500": {
                        "$ref": "#/components/responses/InternalServerError"
                    }
                }
            }
        }
    },
    "components": {
        "schemas": {
            "OpenApiDocument": {
                "type": "object",
                "description": "OpenAPI 3.0 document",
                "required": [
                    "openapi",
                    "info",
                    "paths"
                ],
                "properties": {
                    "openapi": {
                        "type": "string",
                        "example": "3.0.3"
                    },
                    "info": {
                        "type": "object",
                        "required": [
                            "title",
                            "version"
                        ],
                        "properties": {
                            "title": {
                                "type": "string",
                                "example": "Orders API"
                            },
                            "version": {
                                "type": "string",
                                "example": "1.0.0"
                            },
                            "description": {
                                "type": "string"
                            }
                        }
                    },
                    "servers": {
                        "type": "array",
                        "items": {
                            "type": "object",
                            "properties": {
                                "url": {
                                    "type": "string",
                                    "format": "uri"
                                },
                                "description": {
                                    "type": "string"
                                }
                            }
                        }
                    },
                    "paths": {
                        "type": "object",
                        "additionalProperties": true
                    },
                    "components": {
                        "type": "object",
                        "additionalProperties": true
                    }
                }
            },
            "HealthResponse": {
                "type": "object",
                "required": [
                    "status",
                    "service",
                    "version"
                ],
                "properties": {
                    "status": {
                        "type": "string",
                        "enum": [
                            "ok"
                        ],
                        "example": "ok"
                    },
                    "service": {
                        "type": "string",
                        "example": "orders-api"
                    },
                    "version": {
                        "type": "string",
                        "example": "1.0.0"
                    }
                }
            },
            "Order": {
                "type": "object",
                "required": [
                    "id",
                    "customerId",
                    "status",
                    "total",
                    "currency"
                ],
                "properties": {
                    "id": {
                        "type": "string",
                        "description": "Unique order identifier",
                        "example": "ord-001"
                    },
                    "customerId": {
                        "type": "string",
                        "description": "ID of the customer who placed the order",
                        "example": "usr-001"
                    },
                    "status": {
                        "type": "string",
                        "description": "Order lifecycle status",
                        "enum": [
                            "pending",
                            "processing",
                            "shipped",
                            "cancelled"
                        ],
                        "example": "pending"
                    },
                    "total": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "description": "Order total amount",
                        "example": 49.99
                    },
                    "currency": {
                        "type": "string",
                        "description": "ISO 4217 currency code",
                        "minLength": 3,
                        "maxLength": 3,
                        "example": "USD"
                    }
                }
            },
            "OrderListResponse": {
                "type": "object",
                "required": [
                    "data",
                    "count"
                ],
                "properties": {
                    "data": {
                        "type": "array",
                        "description": "Orders in this page",
                        "items": {
                            "$ref": "#/components/schemas/Order"
                        }
                    },
                    "count": {
                        "type": "integer",
                        "minimum": 0,
                        "description": "Number of orders returned",
                        "example": 2
                    }
                }
            },
            "CreateOrderRequest": {
                "type": "object",
                "required": [
                    "customerId",
                    "total"
                ],
                "properties": {
                    "customerId": {
                        "type": "string",
                        "description": "Customer placing the order",
                        "example": "usr-002"
                    },
                    "total": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 99.5
                    },
                    "status": {
                        "type": "string",
                        "description": "Initial order status",
                        "enum": [
                            "pending",
                            "processing",
                            "shipped",
                            "cancelled"
                        ],
                        "default": "pending",
                        "example": "pending"
                    },
                    "currency": {
                        "type": "string",
                        "description": "ISO 4217 currency code",
                        "minLength": 3,
                        "maxLength": 3,
                        "default": "USD",
                        "example": "USD"
                    }
                }
            },
            "UpdateOrderRequest": {
                "type": "object",
                "required": [
                    "customerId",
                    "total",
                    "status"
                ],
                "properties": {
                    "customerId": {
                        "type": "string",
                        "example": "usr-003"
                    },
                    "total": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 149.99
                    },
                    "status": {
                        "type": "string",
                        "enum": [
                            "pending",
                            "processing",
                            "shipped",
                            "cancelled"
                        ],
                        "example": "processing"
                    },
                    "currency": {
                        "type": "string",
                        "minLength": 3,
                        "maxLength": 3,
                        "example": "EUR"
                    }
                }
            },
            "PatchOrderRequest": {
                "type": "object",
                "minProperties": 1,
                "properties": {
                    "customerId": {
                        "type": "string",
                        "example": "usr-003"
                    },
                    "total": {
                        "type": "number",
                        "format": "double",
                        "minimum": 0,
                        "example": 149.99
                    },
                    "status": {
                        "type": "string",
                        "enum": [
                            "pending",
                            "processing",
                            "shipped",
                            "cancelled"
                        ],
                        "example": "shipped"
                    },
                    "currency": {
                        "type": "string",
                        "minLength": 3,
                        "maxLength": 3,
                        "example": "EUR"
                    }
                }
            },
            "ErrorResponse": {
                "type": "object",
                "required": [
                    "error"
                ],
                "properties": {
                    "error": {
                        "type": "string",
                        "example": "Order not found"
                    },
                    "service": {
                        "type": "string",
                        "example": "orders-api"
                    }
                }
            },
            "ServerErrorResponse": {
                "type": "object",
                "required": [
                    "error"
                ],
                "properties": {
                    "error": {
                        "type": "string",
                        "example": "Simulated response for API Catalog demo"
                    },
                    "status": {
                        "type": "integer",
                        "example": 500
                    },
                    "simulated": {
                        "type": "boolean",
                        "example": true
                    },
                    "service": {
                        "type": "string",
                        "example": "orders-api"
                    },
                    "delayMs": {
                        "type": "integer",
                        "example": 2000
                    }
                }
            }
        },
        "responses": {
            "InternalServerError": {
                "description": "Internal server error. Simulatable with ?status=500 on any endpoint except /openapi.json.",
                "content": {
                    "application/json": {
                        "schema": {
                            "$ref": "#/components/schemas/ServerErrorResponse"
                        }
                    }
                }
            }
        }
    }
}