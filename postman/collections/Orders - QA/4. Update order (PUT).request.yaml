$kind: http-request
url: "{{baseUrl}}/orders/{{qaRecordId}}"
method: PUT
headers:
  Content-Type: application/json
body:
  type: text
  content: |-
    {
      "customerId": "usr-003",
      "total": 149.99,
      "status": "processing",
      "currency": "EUR"
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 OK', function () { pm.response.to.have.status(200); });
      const body = pm.response.json();
      pm.test('Full replace applied', function () {
        pm.expect(body.customerId).to.eql('usr-003');
        pm.expect(body.total).to.eql(149.99);
        pm.expect(body.status).to.eql('processing');
        pm.expect(body.currency).to.eql('EUR');
      });
    language: text/javascript
order: 4000
