$kind: http-request
url: "{{baseUrl}}/payments/refund"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "paymentId": "pay-001",
      "reason": "customer_request"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "paymentId": {
          "type": "string",
          "example": "pay-001"
        },
        "reason": {
          "type": "string",
          "example": "customer_request"
        }
      },
      "required": [
        "paymentId"
      ]
    }
scripts:
  - type: afterResponse
    code: |-
      pm.test('Status 200 OK', function () { pm.response.to.have.status(200); });
      const body = pm.response.json();
      pm.test('Payment refunded', function () { pm.expect(body.status).to.eql('refunded'); });
      pm.test('Refund reason set', function () { pm.expect(body.refundReason).to.eql('customer_request'); });
      pm.test('refundedAt present', function () { pm.expect(body.refundedAt).to.be.a('string'); });
    language: text/javascript
examples: ./.resources/Refund a payment.resources/examples
order: 1000
