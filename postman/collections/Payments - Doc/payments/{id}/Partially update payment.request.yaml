$kind: http-request
url: "{{baseUrl}}/payments/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: pay-001
    description: Payment identifier
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "example": "pay-001"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "orderId": "string",
      "amount": 5135.103932667269,
      "status": "completed",
      "currency": "USD"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "orderId": {
          "type": "string"
        },
        "amount": {
          "type": "number",
          "minimum": 0,
          "format": "double"
        },
        "status": {
          "type": "string",
          "enum": [
            "pending",
            "completed",
            "refunded"
          ],
          "example": "completed"
        },
        "currency": {
          "type": "string",
          "minLength": 3,
          "maxLength": 3,
          "example": "USD"
        }
      }
    }
examples: ./.resources/Partially update payment.resources/examples
order: 3000
