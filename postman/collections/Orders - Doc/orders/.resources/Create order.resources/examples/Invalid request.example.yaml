$kind: http-example
request:
  url: "{{baseUrl}}/orders"
  method: POST
  headers:
    Content-Type: application/json
    Accept: application/json
  body:
    type: json
    content: |-
      {
        "customerId": "usr-002",
        "total": 99.5,
        "status": "pending",
        "currency": "USD"
      }
response:
  statusCode: 400
  statusText: Bad Request
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "error": "Order not found",
        "service": "orders-api"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "error": {
            "type": "string",
            "example": "Order not found"
          },
          "service": {
            "type": "string",
            "example": "orders-api"
          }
        },
        "required": [
          "error"
        ]
      }
order: 2000
