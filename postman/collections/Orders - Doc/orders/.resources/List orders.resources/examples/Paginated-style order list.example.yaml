$kind: http-example
request:
  url: "{{baseUrl}}/orders"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": [
          {
            "id": "ord-001",
            "customerId": "usr-001",
            "status": "shipped",
            "total": 49.99,
            "currency": "USD"
          }
        ],
        "count": 1
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "data": {
            "type": "array",
            "description": "Orders in this page",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": "string",
                  "example": "ord-001",
                  "description": "Unique order identifier"
                },
                "customerId": {
                  "type": "string",
                  "example": "usr-001",
                  "description": "ID of the customer who placed the order"
                },
                "status": {
                  "type": "string",
                  "enum": [
                    "pending",
                    "processing",
                    "shipped",
                    "cancelled"
                  ],
                  "example": "pending",
                  "description": "Order lifecycle status"
                },
                "total": {
                  "type": "number",
                  "minimum": 0,
                  "example": 49.99,
                  "description": "Order total amount",
                  "format": "double"
                },
                "currency": {
                  "type": "string",
                  "minLength": 3,
                  "maxLength": 3,
                  "example": "USD",
                  "description": "ISO 4217 currency code"
                }
              },
              "required": [
                "id",
                "customerId",
                "status",
                "total",
                "currency"
              ]
            }
          },
          "count": {
            "type": "integer",
            "minimum": 0,
            "example": 2,
            "description": "Number of orders returned"
          }
        },
        "required": [
          "data",
          "count"
        ]
      }
order: 1000
