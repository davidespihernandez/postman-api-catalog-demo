$kind: http-request
url: "{{baseUrl}}/orders/:id"
method: PATCH
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: ord-001
    description: Order identifier
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "example": "ord-001"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "status": "shipped"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "customerId": {
          "type": "string",
          "example": "usr-003"
        },
        "total": {
          "type": "number",
          "minimum": 0,
          "example": 149.99,
          "format": "double"
        },
        "status": {
          "type": "string",
          "enum": [
            "pending",
            "processing",
            "shipped",
            "cancelled"
          ],
          "example": "shipped"
        },
        "currency": {
          "type": "string",
          "minLength": 3,
          "maxLength": 3,
          "example": "EUR"
        }
      }
    }
examples: ./.resources/Partially update order.resources/examples
order: 3000
