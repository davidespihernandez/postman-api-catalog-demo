$kind: http-request
url: "{{baseUrl}}/orders"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "customerId": "usr-002",
      "total": 99.5,
      "status": "pending",
      "currency": "USD"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "customerId": {
          "type": "string",
          "example": "usr-002",
          "description": "Customer placing the order"
        },
        "total": {
          "type": "number",
          "minimum": 0,
          "example": 99.5,
          "format": "double"
        },
        "status": {
          "type": "string",
          "enum": [
            "pending",
            "processing",
            "shipped",
            "cancelled"
          ],
          "example": "pending",
          "description": "Initial order status"
        },
        "currency": {
          "type": "string",
          "minLength": 3,
          "maxLength": 3,
          "example": "USD",
          "description": "ISO 4217 currency code"
        }
      },
      "required": [
        "customerId",
        "total"
      ]
    }
examples: ./.resources/Create order.resources/examples
order: 3000
