$kind: http-example
request:
  url: "{{baseUrl}}/openapi.json"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: "{}"
    $type: |-
      {
        "type": "object"
      }
order: 1000
