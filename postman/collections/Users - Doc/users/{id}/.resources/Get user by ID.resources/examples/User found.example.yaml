$kind: http-example
request:
  url: "{{baseUrl}}/users/:id"
  method: GET
  headers:
    Accept: application/json
  pathVariables:
    - key: id
      value: usr-001
      description: User identifier
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "id": "usr-001",
        "name": "Alice Chen",
        "email": "alice@example.com",
        "role": "customer"
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "id": {
            "type": "string",
            "example": "usr-001",
            "description": "Unique user identifier"
          },
          "name": {
            "type": "string",
            "example": "Alice Chen",
            "description": "Display name"
          },
          "email": {
            "type": "string",
            "example": "alice@example.com",
            "format": "email"
          },
          "role": {
            "type": "string",
            "enum": [
              "customer",
              "admin"
            ],
            "example": "customer"
          }
        },
        "required": [
          "id",
          "name",
          "email",
          "role"
        ]
      }
order: 1000
