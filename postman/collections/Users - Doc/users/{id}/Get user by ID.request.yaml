$kind: http-request
url: "{{baseUrl}}/users/:id"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: id
    value: usr-001
    description: User identifier
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "example": "usr-001"
          }
        },
        "required": [
          "value"
        ]
      }
examples: ./.resources/Get user by ID.resources/examples
order: 1000
