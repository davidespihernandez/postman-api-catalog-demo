$kind: http-request
url: "{{baseUrl}}/users/:id"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: id
    value: usr-001
    description: User identifier
    $type: |-
      {
        "type": "object",
        "properties": {
          "value": {
            "type": "string",
            "example": "usr-001"
          }
        },
        "required": [
          "value"
        ]
      }
body:
  type: json
  content: |-
    {
      "name": "QA Updated User",
      "email": "qa.updated@example.com",
      "role": "customer"
    }
  $type: |-
    {
      "type": "object",
      "properties": {
        "name": {
          "type": "string",
          "example": "QA Updated User"
        },
        "email": {
          "type": "string",
          "example": "qa.updated@example.com",
          "format": "email"
        },
        "role": {
          "type": "string",
          "enum": [
            "customer",
            "admin"
          ],
          "example": "customer"
        }
      },
      "required": [
        "name",
        "email",
        "role"
      ]
    }
examples: ./.resources/Replace user.resources/examples
order: 2000
