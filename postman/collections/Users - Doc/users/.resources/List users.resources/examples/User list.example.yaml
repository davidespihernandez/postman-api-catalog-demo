$kind: http-example
request:
  url: "{{baseUrl}}/users"
  method: GET
  headers:
    Accept: application/json
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "data": [
          {
            "id": "usr-001",
            "name": "Alice Chen",
            "email": "alice@example.com",
            "role": "customer"
          }
        ],
        "count": 1
      }
    $type: |-
      {
        "type": "object",
        "properties": {
          "data": {
            "type": "array",
            "items": {
              "type": "object",
              "properties": {
                "id": {
                  "type": "string",
                  "example": "usr-001",
                  "description": "Unique user identifier"
                },
                "name": {
                  "type": "string",
                  "example": "Alice Chen",
                  "description": "Display name"
                },
                "email": {
                  "type": "string",
                  "example": "alice@example.com",
                  "format": "email"
                },
                "role": {
                  "type": "string",
                  "enum": [
                    "customer",
                    "admin"
                  ],
                  "example": "customer"
                }
              },
              "required": [
                "id",
                "name",
                "email",
                "role"
              ]
            }
          },
          "count": {
            "type": "integer",
            "minimum": 0,
            "example": 3
          }
        },
        "required": [
          "data",
          "count"
        ]
      }
order: 1000
