$kind: http-request
url: "{{baseUrl}}/"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "event": "payment.refunded",
      "occurredAt": "2026-07-07T15:30:00.000Z",
      "payment": {
        "id": "pay-001",
        "orderId": "ord-001",
